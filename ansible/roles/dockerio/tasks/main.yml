---

- name: Install docker.io and dependencies
  become: true
  ansible.builtin.apt:
    name:
      - apt-transport-https
      - ca-certificates
      - curl
      - software-properties-common
      - docker.io
      - docker-compose-v2

- name: Ensure old docker-compose is not installed
  become: true
  ansible.builtin.apt:
    name: docker-compose
    state: absent
