---

- name: "Create config folder: /etc/docker-compose/audiomuse/"
  become: true
  ansible.builtin.file:
    path: "/etc/docker-compose/audiomuse/"
    state: directory
    mode: "644"

- name: "Prepare environment file. Only if no file exist. This needs to be enhanced with secrets. It is therefore only accessible by root."
  become: true
  ansible.builtin.template:
    src: "audiomuse.env"
    dest: "/etc/docker-compose/audiomuse/.env"
    mode: "644"
    force: false

- ansible.builtin.include_role:
    name: docker-compose-service
  vars:
    service_name: "audiomuse"
